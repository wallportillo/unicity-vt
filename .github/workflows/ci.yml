name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Provide stub values so the startup env guard passes during build
          WORLDPAY_MERCHANT_CODE: ci-stub
          WORLDPAY_XML_PASSWORD: ci-stub
          WORLDPAY_ENDPOINT: https://secure-test.worldpay.com/jsp/merchant/xml/paymentService.jsp
